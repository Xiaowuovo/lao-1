<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>湘潭大学智慧校园任务管理系统 - 登录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 450px;
      padding: 40px;
    }

    .logo-section {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-section h1 {
      color: #667eea;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .logo-section p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
      font-size: 18px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px 12px 45px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-group input.error {
      border-color: #f44336;
    }

    .error-message {
      color: #f44336;
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .remember-forgot label {
      display: flex;
      align-items: center;
      color: #666;
      cursor: pointer;
    }

    .remember-forgot input[type="checkbox"] {
      margin-right: 5px;
    }

    .remember-forgot a {
      color: #667eea;
      text-decoration: none;
    }

    .remember-forgot a:hover {
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .divider {
      text-align: center;
      margin: 25px 0;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
      background: #e0e0e0;
    }

    .divider span {
      position: relative;
      background: white;
      padding: 0 15px;
      color: #999;
      font-size: 14px;
    }

    .register-link {
      text-align: center;
      color: #666;
      font-size: 14px;
    }

    .register-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    .test-accounts {
      margin-top: 30px;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 10px;
      font-size: 13px;
    }

    .test-accounts h4 {
      color: #666;
      margin-bottom: 10px;
    }

    .test-accounts p {
      color: #888;
      line-height: 1.6;
      margin: 5px 0;
    }

    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef5350;
    }

    .alert-success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #66bb6a;
    }

    .loading {
      display: none;
      text-align: center;
      margin: 10px 0;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="logo-section">
      <h1>校园事务提醒系统</h1>
      <p>湘潭大学智能提醒平台</p>
    </div>

    <div id="alertBox" class="alert"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>学号</label>
        <div class="input-wrapper">
          <i></i>
          <input 
            type="text" 
            id="studentId" 
            placeholder="请输入12位学号（如：202205570603）" 
            maxlength="12"
            required
          >
        </div>
        <div class="error-message" id="studentIdError"></div>
      </div>

      <div class="form-group">
        <label>密码</label>
        <div class="input-wrapper">
          <i></i>
          <input 
            type="password" 
            id="password" 
            placeholder="请输入密码" 
            required
          >
        </div>
        <div class="error-message" id="passwordError"></div>
      </div>

      <div class="remember-forgot">
        <label>
          <input type="checkbox" id="rememberMe"> 记住我
        </label>
        <a href="#" onclick="alert('请联系管理员重置密码'); return false;">忘记密码？</a>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">登录</button>
    </form>

    <div class="divider">
      <span>或</span>
    </div>

    <div class="register-link">
      还没有账号？<a href="register.html">立即注册</a>
    </div>

    <div class="test-accounts">
      <h4>🧪 测试账号（密码: xtu123456）</h4>
      <p>学号: 202205570603 (张三 - 信科院)</p>
      <p>学号: 202205580501 (王五 - 计院)</p>
      <p>学号: 202305570201 (赵六 - 信科院)</p>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
