<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>湘潭大学智慧校园任务管理系统 - 注册</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .register-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 500px;
      padding: 40px;
    }

    .logo-section {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-section h1 {
      color: #667eea;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .logo-section p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group label .required {
      color: #f44336;
      margin-left: 2px;
    }

    .input-wrapper {
      position: relative;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-group input.error {
      border-color: #f44336;
    }

    .form-group input.success {
      border-color: #4caf50;
    }

    .error-message, .success-message, .hint-message {
      font-size: 12px;
      margin-top: 5px;
      display: none;
    }

    .error-message {
      color: #f44336;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      color: #4caf50;
    }

    .success-message.show {
      display: block;
    }

    .hint-message {
      color: #999;
    }

    .hint-message.show {
      display: block;
    }

    .btn-register {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-register:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }

    .login-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert-error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef5350;
    }

    .alert-success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #66bb6a;
    }

    .student-id-info {
      background: #e3f2fd;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.6;
    }

    .student-id-info h4 {
      color: #1976d2;
      margin-bottom: 8px;
    }

    .student-id-info p {
      color: #555;
      margin: 4px 0;
    }

    .student-id-info .example {
      color: #1976d2;
      font-weight: 600;
    }

    .loading {
      display: none;
      text-align: center;
      margin: 10px 0;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .password-strength {
      margin-top: 5px;
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }

    .password-strength.show {
      display: block;
    }

    .password-strength-bar {
      height: 100%;
      transition: all 0.3s;
    }

    .password-strength-bar.weak {
      width: 33%;
      background: #f44336;
    }

    .password-strength-bar.medium {
      width: 66%;
      background: #ff9800;
    }

    .password-strength-bar.strong {
      width: 100%;
      background: #4caf50;
    }
  </style>
</head>

<body>
  <div class="register-container">
    <div class="logo-section">
      <h1>注册新账号</h1>
      <p>湘潭大学校园事务提醒系统</p>
    </div>

    <div class="student-id-info">
      <h4>学号格式说明</h4>
      <p>学号为12位数字，格式：<span class="example">年份(4位) + 学院代码(4位) + 班级序号(4位)</span></p>
      <p>示例：<span class="example">202205570603</span></p>
      <p>- 2022: 入学年份</p>
      <p>- 0557: 信息工程学院</p>
      <p>- 0603: 06班03号</p>
    </div>

    <div id="alertBox" class="alert"></div>

    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>学号<span class="required">*</span></label>
        <input 
          type="text" 
          id="studentId" 
          placeholder="请输入12位学号" 
          maxlength="12"
          required
        >
        <div class="error-message" id="studentIdError"></div>
        <div class="success-message" id="studentIdSuccess"></div>
      </div>

      <div class="form-group">
        <label>用户名<span class="required">*</span></label>
        <input 
          type="text" 
          id="username" 
          placeholder="请输入用户名（2-20字符）" 
          minlength="2"
          maxlength="20"
          required
        >
        <div class="error-message" id="usernameError"></div>
        <div class="hint-message show">用于系统显示，可使用中文或英文</div>
      </div>

      <div class="form-group">
        <label>真实姓名<span class="required">*</span></label>
        <input 
          type="text" 
          id="realName" 
          placeholder="请输入真实姓名" 
          required
        >
        <div class="hint-message show">请填写真实姓名，便于身份确认</div>
      </div>

      <div class="form-group">
        <label>邮箱<span class="required">*</span></label>
        <input 
          type="email" 
          id="email" 
          placeholder="请输入邮箱（如：xxx@xtu.edu.cn）" 
          required
        >
        <div class="error-message" id="emailError"></div>
      </div>

      <div class="form-group">
        <label>手机号（可选）</label>
        <input 
          type="tel" 
          id="phone" 
          placeholder="请输入手机号" 
          maxlength="11"
        >
      </div>

      <div class="form-group">
        <label>密码<span class="required">*</span></label>
        <input 
          type="password" 
          id="password" 
          placeholder="请输入密码（至少6位）" 
          minlength="6"
          required
        >
        <div class="password-strength" id="passwordStrength">
          <div class="password-strength-bar"></div>
        </div>
        <div class="error-message" id="passwordError"></div>
      </div>

      <div class="form-group">
        <label>确认密码<span class="required">*</span></label>
        <input 
          type="password" 
          id="confirmPassword" 
          placeholder="请再次输入密码" 
          required
        >
        <div class="error-message" id="confirmPasswordError"></div>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
      </div>

      <button type="submit" class="btn-register" id="registerBtn">立即注册</button>
    </form>

    <div class="login-link">
      已有账号？<a href="login.html">立即登录</a>
    </div>
  </div>

  <script src="register.js"></script>
</body>
</html>
